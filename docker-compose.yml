services:
  db:
    image: mysql:8.0
    container_name: police-eom-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: police_eom
      MYSQL_USER: eom
      MYSQL_PASSWORD: eompass
    ports:
      - "13316:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: police-eom-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8615
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: eom
      DB_PASSWORD: eompass
      DB_NAME: police_eom
    ports:
      - "8615:8615"

volumes:
  db_data:
